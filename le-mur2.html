<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Briiiique</title>
  <link rel="icon" href="https://github.com/scienceetpoesie-coder/site-internet-science-et-poesie/raw/refs/heads/main/assets/favicon.ico" type="image/x-icon">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; overflow: hidden; background: black; }
    canvas { display: block; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl');

const vsrc = `
  attribute vec2 a_pos;
  varying vec2 v_uv;
  void main(){v_uv=(a_pos+1.)/2.; gl_Position=vec4(a_pos,0,1);}
`;
const fsrc = `
  precision mediump float;
  varying vec2 v_uv;
  uniform float u_time;
  uniform sampler2D u_tex;
  void main(){
    vec2 uv = v_uv;
    float mask = step(0.01,uv.x)*step(0.01,uv.y)*step(uv.x,0.99)*step(uv.y,0.99);
    uv.y += sin(v_uv.x*8. + u_time*3.) * 0.1;
    gl_FragColor = texture2D(u_tex, uv) * vec4(1.,1.,1.,mask);
  }
`;

function makeShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, makeShader(gl.VERTEX_SHADER, vsrc));
gl.attachShader(prog, makeShader(gl.FRAGMENT_SHADER, fsrc));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

const loc = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(loc);
gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

const uTime = gl.getUniformLocation(prog, 'u_time');

const tex = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, tex);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);

const img = new Image();
img.crossOrigin = 'anonymous';
img.src = 'https://raw.githubusercontent.com/scienceetpoesie-coder/site-internet-science-et-poesie/main/mur%20brique.png';
img.onload = () => {
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
  loop();
};

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
resize();
window.addEventListener('resize', resize);

function loop() {
  gl.uniform1f(uTime, performance.now() / 1000);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
