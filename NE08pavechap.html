<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MODULOR</title>
  <link rel="icon" href="https://github.com/scienceetpoesie-coder/notre-entente/raw/refs/heads/main/assets/coeur.ico" type="image/x-icon">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fff;
      font-family: 'Times New Roman', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
    }
    canvas {
      display: block;
      width: 80vw;
      max-width: 800px;
      height: 60vh;
    }
    .controls {
      margin-top: 30px;
      width: 80vw;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .slider-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .slider-row label {
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #555;
      width: 120px;
      flex-shrink: 0;
    }
    .slider-row input[type=range] { flex: 1; }
    .slider-row span {
      font-size: 13px;
      color: #333;
      width: 40px;
      text-align: right;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="controls">
    <div class="slider-row">
      <label>Répétition</label>
      <input type="range" id="rep" min="1" max="20" step="0.5" value="8">
      <span id="repVal">8</span>
    </div>
    <div class="slider-row">
      <label>Vitesse</label>
      <input type="range" id="spd" min="0" max="10" step="0.1" value="3">
      <span id="spdVal">3.0</span>
    </div>
    <div class="slider-row">
      <label>Amplitude</label>
      <input type="range" id="amp" min="0" max="0.4" step="0.01" value="0.1">
      <span id="ampVal">0.10</span>
    </div>
    <div class="slider-row">
      <label>Direction</label>
      <input type="range" id="dir" min="0" max="1" step="1" value="0">
      <span id="dirVal">X</span>
    </div>
  </div>

<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl');

const vsrc = `
  attribute vec2 a_pos;
  varying vec2 v_uv;
  void main(){v_uv=(a_pos+1.)/2.; gl_Position=vec4(a_pos,0,1);}
`;
const fsrc = `
  precision mediump float;
  varying vec2 v_uv;
  uniform float u_time;
  uniform float u_rep;
  uniform float u_spd;
  uniform float u_amp;
  uniform float u_dir;
  uniform sampler2D u_tex;
  void main(){
    vec2 uv = v_uv;
    float mask = step(0.01,uv.x)*step(0.01,uv.y)*step(uv.x,0.99)*step(uv.y,0.99);
    if(u_dir < 0.5){
      uv.y += sin(v_uv.x * u_rep + u_time * u_spd) * u_amp;
    } else {
      uv.x += sin(v_uv.y * u_rep + u_time * u_spd) * u_amp;
    }
    gl_FragColor = texture2D(u_tex, uv) * vec4(1.,1.,1.,mask);
  }
`;

function makeShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, makeShader(gl.VERTEX_SHADER, vsrc));
gl.attachShader(prog, makeShader(gl.FRAGMENT_SHADER, fsrc));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

const loc = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(loc);
gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

const uTime = gl.getUniformLocation(prog, 'u_time');
const uRep  = gl.getUniformLocation(prog, 'u_rep');
const uSpd  = gl.getUniformLocation(prog, 'u_spd');
const uAmp  = gl.getUniformLocation(prog, 'u_amp');
const uDir  = gl.getUniformLocation(prog, 'u_dir');

let rep = 8, spd = 3, amp = 0.1, dir = 0;

document.getElementById('rep').oninput = e => {
  rep = +e.target.value;
  document.getElementById('repVal').textContent = rep;
};
document.getElementById('spd').oninput = e => {
  spd = +e.target.value;
  document.getElementById('spdVal').textContent = (+e.target.value).toFixed(1);
};
document.getElementById('amp').oninput = e => {
  amp = +e.target.value;
  document.getElementById('ampVal').textContent = (+e.target.value).toFixed(2);
};
document.getElementById('dir').oninput = e => {
  dir = +e.target.value;
  document.getElementById('dirVal').textContent = dir < 0.5 ? 'X' : 'Y';
};

const tex = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, tex);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);

const img = new Image();
img.crossOrigin = 'anonymous';
img.src = 'https://github.com/scienceetpoesie-coder/notre-entente/blob/main/steiniger_johannes_gross.jpg?raw=true';
img.onerror = () => { console.log('image non trouvée'); };
img.onload = () => {
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
  loop();
};

function resize() {
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
resize();
window.addEventListener('resize', resize);

function loop() {
  gl.uniform1f(uTime, performance.now() / 1000);
  gl.uniform1f(uRep, rep);
  gl.uniform1f(uSpd, spd);
  gl.uniform1f(uAmp, amp);
  gl.uniform1f(uDir, dir);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
