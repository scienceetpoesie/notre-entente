<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MODULOVE</title>
  <link rel="icon" href="https://raw.githubusercontent.com/scienceetpoesie-coder/notre-entente/main/assets/coeur" type="image/x-icon">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fff;
      font-family: 'Times New Roman', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
      gap: 20px;
    }
    .scene {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    #imgBtn {
      width: 60px;
      height: 60px;
      flex-shrink: 0;
      background: #cc0000;
      border-top: 3px solid #ff6666;
      border-left: 3px solid #ff4444;
      border-bottom: 3px solid #660000;
      border-right: 3px solid #880000;
      cursor: pointer;
    }
    #imgBtn:active {
      border-top: 3px solid #660000;
      border-left: 3px solid #880000;
      border-bottom: 3px solid #ff6666;
      border-right: 3px solid #ff4444;
      background: #aa0000;
    }
    canvas {
      display: block;
      width: 720px;
      height: 480px;
      flex-shrink: 0;
    }
    .controls {
      width: 90vw;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .slider-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .slider-row label {
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #555;
      width: 130px;
      flex-shrink: 0;
    }
    .slider-row input[type=range] { flex: 1; accent-color: #888; }
    .slider-row span {
      font-size: 13px;
      color: #333;
      width: 44px;
      text-align: right;
    }
    .btn-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .btn-row label {
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #555;
      width: 130px;
      flex-shrink: 0;
    }
    #dirBtn {
      width: 48px;
      height: 48px;
      font-size: 13px;
      font-family: 'Times New Roman', serif;
      background: #f0f0f0;
      color: black;
      border-top: 2px solid #fff;
      border-left: 2px solid #fff;
      border-bottom: 2px solid #888;
      border-right: 2px solid #888;
      cursor: pointer;
      font-weight: bold;
    }
    #dirBtn:active {
      border-top: 2px solid #888;
      border-left: 2px solid #888;
      border-bottom: 2px solid #fff;
      border-right: 2px solid #fff;
      background: #ddd;
    }
    .separator { border: none; border-top: 1px solid #eee; margin: 6px 0; }
    .section-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #aaa;
    }
    #imgLabel {
      font-size: 13px;
      color: #888;
      letter-spacing: 0.06em;
      text-align: center;
      font-style: italic;
    }
  </style>
</head>
<body>

  <div class="scene">
    <canvas id="c" width="720" height="480"></canvas>
    <button id="imgBtn"></button>
  </div>
  <div id="imgLabel">Suisse allemand</div>

  <div class="controls">

    <div class="section-label">Taille</div>
    <div class="slider-row">
      <label>Largeur :</label>
      <input type="range" id="scaleX" min="0.3" max="3" step="0.01" value="1">
      <span id="scaleXVal">1.00</span>
    </div>
    <div class="slider-row">
      <label>Hauteur :</label>
      <input type="range" id="scaleY" min="0.3" max="3" step="0.01" value="1">
      <span id="scaleYVal">1.00</span>
    </div>

    <hr class="separator">
    <div class="section-label">Ondulation</div>
    <div class="slider-row">
      <label>Répétition :</label>
      <input type="range" id="rep" min="1" max="60" step="0.5" value="10">
      <span id="repVal">10</span>
    </div>
    <div class="slider-row">
      <label>Vitesse :</label>
      <input type="range" id="spd" min="0" max="30" step="0.1" value="5">
      <span id="spdVal">5.0</span>
    </div>
    <div class="slider-row">
      <label>Amplitude :</label>
      <input type="range" id="amp" min="0" max="1.2" step="0.01" value="0.15">
      <span id="ampVal">0.15</span>
    </div>
    <div class="btn-row">
      <label>Axe :</label>
      <button id="dirBtn">X</button>
    </div>

    <hr class="separator">
    <div class="section-label">Chaos</div>
    <div class="slider-row">
      <label>Intensité :</label>
      <input type="range" id="randomSlider" min="0" max="1" step="0.01" value="0" style="accent-color:#111">
      <span id="randomVal">0.00</span>
    </div>

  </div>

<script>
const images = [
  { url: 'https://raw.githubusercontent.com/scienceetpoesie-coder/notre-entente/main/assets/Stephane-Ravier.png', name: 'Stéphane Ravier' },
  { url: 'https://raw.githubusercontent.com/scienceetpoesie-coder/notre-entente/main/assets/steiniger_johannes_gross.jpg', name: 'Johannes Steiniger' },
  { url: 'https://raw.githubusercontent.com/scienceetpoesie-coder/notre-entente/main/assets/Christoph_Blocher_(Bundesrat,_2004).jpg', name: 'Christoph Blocher' },
  { url: 'https://raw.githubusercontent.com/scienceetpoesie-coder/notre-entente/main/assets/Gilles-Lellouche.png', name: 'Gilles Lellouche' },
];

let imgIndex = 0;

const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl');
gl.viewport(0, 0, 720, 480);

const vsrc = `
  attribute vec2 a_pos;
  varying vec2 v_uv;
  uniform float u_scaleX;
  uniform float u_scaleY;
  void main(){
    vec2 uv = (a_pos + 1.0) / 2.0;
    uv.y = 1.0 - uv.y;
    uv.x = (uv.x - 0.5) / u_scaleX + 0.5;
    uv.y = (uv.y - 0.5) / u_scaleY + 0.5;
    v_uv = uv;
    gl_Position = vec4(a_pos, 0, 1);
  }
`;

const fsrc = `
  precision mediump float;
  varying vec2 v_uv;
  uniform float u_time;
  uniform float u_rep;
  uniform float u_spd;
  uniform float u_amp;
  uniform float u_dir;
  uniform float u_chaos;
  uniform float u_chaosPhase;
  uniform float u_chaosFreq;
  uniform sampler2D u_tex;

  float hash(vec2 p){
    return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
  }

  float noise(vec2 p){
    vec2 i = floor(p);
    vec2 f = fract(p);
    f = f * f * (3.0 - 2.0 * f);
    float a = hash(i);
    float b = hash(i + vec2(1.0, 0.0));
    float c = hash(i + vec2(0.0, 1.0));
    float d = hash(i + vec2(1.0, 1.0));
    return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
  }

  void main(){
    vec2 uv = v_uv;

    float freqMod = 1.0 + u_chaos * u_chaosFreq * 2.0;
    float phaseMod = u_chaos * u_chaosPhase;

    float n  = noise(uv * 4.0 * freqMod + u_time * 0.3);
    float n2 = noise(uv * 7.0 * freqMod - u_time * 0.2 + vec2(3.7, 1.1));

    float rep = u_rep * freqMod;

    if(u_dir < 0.5){
      float wave = sin(v_uv.x * rep + u_time * u_spd + n * phaseMod * 6.28) * u_amp;
      wave += u_chaos * sin(v_uv.x * rep * 2.3 + u_time * u_spd * 1.7 + n2 * phaseMod * 3.14) * u_amp * 0.5;
      uv.y += wave;
      uv.x += u_chaos * n * 0.12;
    } else {
      float wave = sin(v_uv.y * rep + u_time * u_spd + n * phaseMod * 6.28) * u_amp;
      wave += u_chaos * sin(v_uv.y * rep * 2.3 + u_time * u_spd * 1.7 + n2 * phaseMod * 3.14) * u_amp * 0.5;
      uv.x += wave;
      uv.y += u_chaos * n * 0.12;
    }

    float mask = step(0.0, uv.x) * step(0.0, uv.y) * step(uv.x, 1.0) * step(uv.y, 1.0);
    gl_FragColor = texture2D(u_tex, uv) * mask + vec4(1., 1., 1., 1.) * (1.0 - mask);
  }
`;

function makeShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, makeShader(gl.VERTEX_SHADER, vsrc));
gl.attachShader(prog, makeShader(gl.FRAGMENT_SHADER, fsrc));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

const loc = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(loc);
gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

const uTime       = gl.getUniformLocation(prog, 'u_time');
const uRep        = gl.getUniformLocation(prog, 'u_rep');
const uSpd        = gl.getUniformLocation(prog, 'u_spd');
const uAmp        = gl.getUniformLocation(prog, 'u_amp');
const uDir        = gl.getUniformLocation(prog, 'u_dir');
const uChaos      = gl.getUniformLocation(prog, 'u_chaos');
const uChaosPhase = gl.getUniformLocation(prog, 'u_chaosPhase');
const uChaosFreq  = gl.getUniformLocation(prog, 'u_chaosFreq');
const uScaleX     = gl.getUniformLocation(prog, 'u_scaleX');
const uScaleY     = gl.getUniformLocation(prog, 'u_scaleY');

let rep = 10, spd = 5, amp = 0.15, dir = 0, chaos = 0, scaleX = 1, scaleY = 1;

document.getElementById('rep').oninput = e => {
  rep = +e.target.value;
  document.getElementById('repVal').textContent = rep;
};
document.getElementById('spd').oninput = e => {
  spd = +e.target.value;
  document.getElementById('spdVal').textContent = spd.toFixed(1);
};
document.getElementById('amp').oninput = e => {
  amp = +e.target.value;
  document.getElementById('ampVal').textContent = amp.toFixed(2);
};
document.getElementById('dirBtn').onclick = () => {
  dir = dir < 0.5 ? 1 : 0;
  document.getElementById('dirBtn').textContent = dir < 0.5 ? 'X' : 'Y';
};
document.getElementById('randomSlider').oninput = e => {
  chaos = +e.target.value;
  document.getElementById('randomVal').textContent = chaos.toFixed(2);
};
document.getElementById('scaleX').oninput = e => {
  scaleX = +e.target.value;
  document.getElementById('scaleXVal').textContent = scaleX.toFixed(2);
};
document.getElementById('scaleY').oninput = e => {
  scaleY = +e.target.value;
  document.getElementById('scaleYVal').textContent = scaleY.toFixed(2);
};

const tex = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, tex);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);

function loadImage(index) {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.src = images[index].url;
  img.onload = () => {
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
  };
  document.getElementById('imgLabel').textContent = images[index].name;
}

document.getElementById('imgBtn').onclick = () => {
  imgIndex = (imgIndex + 1) % images.length;
  loadImage(imgIndex);
};

loadImage(0);

let noiseT = 0;
function loop() {
  noiseT += 0.015;
  const chaosPhase = Math.sin(noiseT * 0.7) * 0.5 + 0.5;
  const chaosFreq  = Math.sin(noiseT * 0.4 + 1.2) * 0.5 + 0.5;
  gl.uniform1f(uTime, performance.now() / 1000);
  gl.uniform1f(uRep, Math.max(0.1, rep));
  gl.uniform1f(uSpd, spd);
  gl.uniform1f(uAmp, Math.max(0, amp));
  gl.uniform1f(uDir, dir);
  gl.uniform1f(uChaos, chaos);
  gl.uniform1f(uChaosPhase, chaosPhase);
  gl.uniform1f(uChaosFreq, chaosFreq);
  gl.uniform1f(uScaleX, scaleX);
  gl.uniform1f(uScaleY, scaleY);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
