<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MODULOVE</title>
  <link rel="icon" href="https://github.com/scienceetpoesie-coder/notre-entente/raw/refs/heads/main/assets/coeur" type="image/x-icon">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fff;
      font-family: 'Times New Roman', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
    }
    canvas {
      display: block;
      width: 80vw;
      max-width: 800px;
      height: 60vh;
    }
    .controls {
      margin-top: 30px;
      width: 80vw;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .slider-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .slider-row label {
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #555;
      width: 120px;
      flex-shrink: 0;
    }
    .slider-row input[type=range] { flex: 1; }
    .slider-row span {
      font-size: 13px;
      color: #333;
      width: 40px;
      text-align: right;
    }
    .btn-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .btn-row label {
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #555;
      width: 120px;
      flex-shrink: 0;
    }
    #dirBtn {
      padding: 6px 24px;
      font-size: 13px;
      font-family: 'Times New Roman', serif;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: transparent;
      color: black;
      border: 1.5px solid black;
      cursor: pointer;
    }
    #dirBtn:hover { background: black; color: white; }
    .separator {
      border: none;
      border-top: 1px solid #eee;
      margin: 6px 0;
    }
    #randomSlider { accent-color: #c00; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="controls">

    <div class="slider-row">
      <label>Répétition</label>
      <input type="range" id="rep" min="1" max="40" step="0.5" value="8">
      <span id="repVal">8</span>
    </div>

    <div class="slider-row">
      <label>Vitesse</label>
      <input type="range" id="spd" min="0" max="20" step="0.1" value="3">
      <span id="spdVal">3.0</span>
    </div>

    <div class="slider-row">
      <label>Amplitude</label>
      <input type="range" id="amp" min="0" max="0.8" step="0.01" value="0.1">
      <span id="ampVal">0.10</span>
    </div>

    <div class="btn-row">
      <label>Direction</label>
      <button id="dirBtn">X</button>
    </div>

    <hr class="separator">

    <div class="slider-row">
      <label>Chaos</label>
      <input type="range" id="randomSlider" min="0" max="1" step="0.01" value="0">
      <span id="randomVal">0</span>
    </div>

  </div>

<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl');

const vsrc = `
  attribute vec2 a_pos;
  varying vec2 v_uv;
  void main(){
    vec2 uv = (a_pos + 1.0) / 2.0;
    uv.y = 1.0 - uv.y;
    v_uv = uv;
    gl_Position = vec4(a_pos, 0, 1);
  }
`;
const fsrc = `
  precision mediump float;
  varying vec2 v_uv;
  uniform float u_time;
  uniform float u_rep;
  uniform float u_spd;
  uniform float u_amp;
  uniform float u_dir;
  uniform sampler2D u_tex;
  void main(){
    vec2 uv = v_uv;
    float mask = step(0.01,uv.x)*step(0.01,uv.y)*step(uv.x,0.99)*step(uv.y,0.99);
    if(u_dir < 0.5){
      uv.y += sin(v_uv.x * u_rep + u_time * u_spd) * u_amp;
    } else {
      uv.x += sin(v_uv.y * u_rep + u_time * u_spd) * u_amp;
    }
    gl_FragColor = texture2D(u_tex, uv) * vec4(1.,1.,1.,mask);
  }
`;

function makeShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, makeShader(gl.VERTEX_SHADER, vsrc));
gl.attachShader(prog, makeShader(gl.FRAGMENT_SHADER, fsrc));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

const loc = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(loc);
gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

const uTime = gl.getUniformLocation(prog, 'u_time');
const uRep  = gl.getUniformLocation(prog, 'u_rep');
const uSpd  = gl.getUniformLocation(prog, 'u_spd');
const uAmp  = gl.getUniformLocation(prog, 'u_amp');
const uDir  = gl.getUniformLocation(prog, 'u_dir');

let rep = 8, spd = 3, amp = 0.1, dir = 0;
let baseRep = 8, baseSpd = 3, baseAmp = 0.1;
let chaos = 0;

const repSlider = document.getElementById('rep');
const spdSlider = document.getElementById('spd');
const ampSlider = document.getElementById('amp');
const repVal    = document.getElementById('repVal');
const spdVal    = document.getElementById('spdVal');
const ampVal    = document.getElementById('ampVal');
const dirBtn    = document.getElementById('dirBtn');
const randomSlider = document.getElementById('randomSlider');

repSlider.oninput = e => {
  baseRep = +e.target.value;
  rep = baseRep;
  repVal.textContent = rep;
};
spdSlider.oninput = e => {
  baseSpd = +e.target.value;
  spd = baseSpd;
  spdVal.textContent = baseSpd.toFixed(1);
};
ampSlider.oninput = e => {
  baseAmp = +e.target.value;
  amp = baseAmp;
  ampVal.textContent = baseAmp.toFixed(2);
};

dirBtn.onclick = () => {
  dir = dir < 0.5 ? 1 : 0;
  dirBtn.textContent = dir < 0.5 ? 'X' : 'Y';
};

randomSlider.oninput = e => {
  chaos = +e.target.value;
  document.getElementById('randomVal').textContent = chaos.toFixed(2);
};

const tex = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, tex);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);

const img = new Image();
img.crossOrigin = 'anonymous';
img.src = 'https://raw.githubusercontent.com/scienceetpoesie-coder/notre-entente/main/steiniger_johannes_gross.jpg';
img.onerror = () => { console.log('image non trouvée'); };
img.onload = () => {
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
  loop();
};

function resize() {
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
resize();
window.addEventListener('resize', resize);

let noiseT = 0;
function loop() {
  noiseT += 0.02;
  const noise = Math.sin(noiseT * 1.3) * Math.cos(noiseT * 0.7);
  rep = baseRep + noise * chaos * 20;
  spd = baseSpd + Math.sin(noiseT * 0.9) * chaos * 10;
  amp = baseAmp + Math.cos(noiseT * 1.1) * chaos * 0.4;

  gl.uniform1f(uTime, performance.now() / 1000);
  gl.uniform1f(uRep, Math.max(0.1, rep));
  gl.uniform1f(uSpd, spd);
  gl.uniform1f(uAmp, Math.max(0, amp));
  gl.uniform1f(uDir, dir);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
