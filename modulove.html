<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MODULOVE</title>
  <link rel="icon" href="https://raw.githubusercontent.com/scienceetpoesie-coder/notre-entente/main/assets/coeur" type="image/x-icon">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fff;
      font-family: 'Times New Roman', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .scene {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    #imgBtn {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: #b30000;
      border: 5px solid #7a0000;
      box-shadow: 0 4px 0 #4a0000, 0 6px 8px rgba(0,0,0,0.35);
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    #imgBtn:hover { background: #cc0000; }
    #imgBtn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #4a0000, 0 2px 4px rgba(0,0,0,0.3);
    }
    canvas {
      display: block;
      max-width: 80vw;
      max-height: 70vh;
    }
    .controls {
      margin-top: 30px;
      width: 80vw;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .slider-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .slider-row label {
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #555;
      width: 120px;
      flex-shrink: 0;
    }
    .slider-row input[type=range] { flex: 1; accent-color: #888; }
    .slider-row span {
      font-size: 13px;
      color: #333;
      width: 40px;
      text-align: right;
    }
    .btn-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .btn-row label {
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #555;
      width: 120px;
      flex-shrink: 0;
    }
    #dirBtn {
      padding: 6px 24px;
      font-size: 13px;
      font-family: 'Times New Roman', serif;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: transparent;
      color: black;
      border: 1.5px solid black;
      cursor: pointer;
    }
    #dirBtn:hover { background: black; color: white; }
    .separator { border: none; border-top: 1px solid #eee; margin: 6px 0; }
    #imgLabel {
      font-size: 11px;
      color: #aaa;
      letter-spacing: 0.08em;
      text-align: center;
      margin-top: -8px;
    }
  </style>
</head>
<body>
  <div class="scene">
    <canvas id="c"></canvas>
    <button id="imgBtn"></button>
  </div>
  <div id="imgLabel">Image 1 / 4</div>

  <div class="controls">
    <div class="slider-row">
      <label>Répétition</label>
      <input type="range" id="rep" min="1" max="40" step="0.5" value="8">
      <span id="repVal">8</span>
    </div>
    <div class="slider-row">
      <label>Vitesse</label>
      <input type="range" id="spd" min="0" max="20" step="0.1" value="3">
      <span id="spdVal">3.0</span>
    </div>
    <div class="slider-row">
      <label>Amplitude</label>
      <input type="range" id="amp" min="0" max="0.8" step="0.01" value="0.1">
      <span id="ampVal">0.10</span>
    </div>
    <div class="btn-row">
      <label>Direction</label>
      <button id="dirBtn">X</button>
    </div>
    <hr class="separator">
    <div class="slider-row">
      <label>Chaos</label>
      <input type="range" id="randomSlider" min="0" max="1" step="0.01" value="0" style="accent-color:#111">
      <span id="randomVal">0.00</span>
    </div>
  </div>

<script>
const images = [
  'https://raw.githubusercontent.com/scienceetpoesie-coder/notre-entente/main/assets/3%20PERSONNAGE/suiise%20allemand.jpg',
  'https://raw.githubusercontent.com/scienceetpoesie-coder/notre-entente/main/assets/Stephane-Ravier.png',
  'https://raw.githubusercontent.com/scienceetpoesie-coder/notre-entente/main/assets/steiniger_johannes_gross.jpg',
  'https://raw.githubusercontent.com/scienceetpoesie-coder/notre-entente/main/assets/Gilles-Lellouche.png,
];

let imgIndex = 0;

const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl');

const vsrc = `
  attribute vec2 a_pos;
  varying vec2 v_uv;
  uniform float u_squeeze;
  void main(){
    vec2 uv = (a_pos + 1.0) / 2.0;
    uv.y = 1.0 - uv.y;
    uv.y = uv.y * u_squeeze + (1.0 - u_squeeze) * 0.5;
    v_uv = uv;
    gl_Position = vec4(a_pos, 0, 1);
  }
`;
const fsrc = `
  precision mediump float;
  varying vec2 v_uv;
  uniform float u_time;
  uniform float u_rep;
  uniform float u_spd;
  uniform float u_amp;
  uniform float u_dir;
  uniform sampler2D u_tex;
  void main(){
    vec2 uv = v_uv;
    float mask = step(0.01,uv.x)*step(0.01,uv.y)*step(uv.x,0.99)*step(uv.y,0.99);
    if(u_dir < 0.5){
      uv.y += sin(v_uv.x * u_rep + u_time * u_spd) * u_amp;
    } else {
      uv.x += sin(v_uv.y * u_rep + u_time * u_spd) * u_amp;
    }
    gl_FragColor = texture2D(u_tex, uv) * vec4(1.,1.,1.,mask);
  }
`;

function makeShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, makeShader(gl.VERTEX_SHADER, vsrc));
gl.attachShader(prog, makeShader(gl.FRAGMENT_SHADER, fsrc));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

const loc = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(loc);
gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

const uTime    = gl.getUniformLocation(prog, 'u_time');
const uRep     = gl.getUniformLocation(prog, 'u_rep');
const uSpd     = gl.getUniformLocation(prog, 'u_spd');
const uAmp     = gl.getUniformLocation(prog, 'u_amp');
const uDir     = gl.getUniformLocation(prog, 'u_dir');
const uSqueeze = gl.getUniformLocation(prog, 'u_squeeze');

let rep = 8, spd = 3, amp = 0.1, dir = 0;
let baseRep = 8, baseSpd = 3, baseAmp = 0.1;
let chaos = 0;
let squeeze = 1.0;

document.getElementById('rep').oninput = e => {
  baseRep = +e.target.value; rep = baseRep;
  document.getElementById('repVal').textContent = rep;
};
document.getElementById('spd').oninput = e => {
  baseSpd = +e.target.value; spd = baseSpd;
  document.getElementById('spdVal').textContent = baseSpd.toFixed(1);
};
document.getElementById('amp').oninput = e => {
  baseAmp = +e.target.value; amp = baseAmp;
  document.getElementById('ampVal').textContent = baseAmp.toFixed(2);
};
document.getElementById('dirBtn').onclick = () => {
  dir = dir < 0.5 ? 1 : 0;
  document.getElementById('dirBtn').textContent = dir < 0.5 ? 'X' : 'Y';
};
document.getElementById('randomSlider').oninput = e => {
  chaos = +e.target.value;
  document.getElementById('randomVal').textContent = chaos.toFixed(2);
};

const tex = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, tex);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);

function loadImage(url) {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.src = url;
  img.onerror = () => { console.log('image non trouvée : ' + url); };
  img.onload = () => {
    const w = img.naturalWidth;
    const h = img.naturalHeight;
    const isPortrait = h > w;

    // Redimensionne le canvas selon le ratio de l'image
    const maxW = window.innerWidth * 0.75;
    const maxH = window.innerHeight * 0.65;
    let cw, ch;
    if (w / h > maxW / maxH) {
      cw = maxW; ch = maxW * h / w;
    } else {
      ch = maxH; cw = maxH * w / h;
    }
    canvas.style.width = cw + 'px';
    canvas.style.height = ch + 'px';
    canvas.width = cw;
    canvas.height = ch;
    gl.viewport(0, 0, canvas.width, canvas.height);

    // Écrase légèrement les portraits
    squeeze = isPortrait ? 0.75 : 1.0;

    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
  };
}

document.getElementById('imgBtn').onclick = () => {
  imgIndex = (imgIndex + 1) % images.length;
  loadImage(images[imgIndex]);
  document.getElementById('imgLabel').textContent = 'Image ' + (imgIndex + 1) + ' / ' + images.length;
};

loadImage(images[0]);

let noiseT = 0;
function loop() {
  noiseT += 0.02;
  const noise = Math.sin(noiseT * 1.3) * Math.cos(noiseT * 0.7);
  rep = baseRep + noise * chaos * 20;
  spd = baseSpd + Math.sin(noiseT * 0.9) * chaos * 10;
  amp = baseAmp + Math.cos(noiseT * 1.1) * chaos * 0.4;
  gl.uniform1f(uTime, performance.now() / 1000);
  gl.uniform1f(uRep, Math.max(0.1, rep));
  gl.uniform1f(uSpd, spd);
  gl.uniform1f(uAmp, Math.max(0, amp));
  gl.uniform1f(uDir, dir);
  gl.uniform1f(uSqueeze, squeeze);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
